<svg viewBox="0 0 500 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <!-- Outer ring -->
  <circle cx="250" cy="230" r="190" fill="none" stroke="#16A34A" stroke-width="3" />
  <!-- Inner ring -->
  <circle cx="250" cy="230" r="160" fill="none" stroke="#16A34A" stroke-width="3" />

  <!-- Wrap boundary box at top -->
  <rect x="195" y="20" width="55" height="36" rx="4" fill="#f59e0b" />
  <rect x="250" y="20" width="55" height="36" rx="4" fill="#f59e0b" />

  <!-- Tick marks -->
  <g stroke="#4353d4" stroke-width="2">
    <line x1="160" y1="56" x2="155" y2="95" />
    <line x1="340" y1="56" x2="345" y2="95" />
    <line x1="120" y1="80" x2="105" y2="115" />
    <line x1="380" y1="80" x2="395" y2="115" />
  </g>

  <!-- Labels -->
  <text x="195" y="14" text-anchor="middle" fill="#1f2937" font-size="15" font-weight="600">2,147,483,647</text>
  <text x="350" y="14" text-anchor="middle" fill="#1f2937" font-size="15" font-weight="600">-2,147,483,648</text>
  <text x="430" y="80" text-anchor="middle" fill="#1f2937" font-size="15" font-weight="600">-2,147,483,647</text>

  <!-- Center text -->
  <text x="250" y="220" text-anchor="middle" fill="#1f2937" font-size="18" font-weight="700">Signed int</text>
  <text x="250" y="248" text-anchor="middle" fill="#475569" font-size="14">wraps around at the limits</text>
  <text x="250" y="278" text-anchor="middle" fill="#475569" font-size="13">MAX + 1 = MIN</text>
</svg>
