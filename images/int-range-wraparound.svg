<svg viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <!-- Main number line -->
  <line x1="90" y1="100" x2="630" y2="100" stroke="#16A34A" stroke-width="4" stroke-linecap="round" />

  <!-- Tick marks -->
  <line x1="90"  y1="85" x2="90"  y2="115" stroke="#16A34A" stroke-width="4" stroke-linecap="round" />
  <line x1="360" y1="85" x2="360" y2="115" stroke="#16A34A" stroke-width="4" stroke-linecap="round" />
  <line x1="630" y1="85" x2="630" y2="115" stroke="#16A34A" stroke-width="4" stroke-linecap="round" />

  <!-- Labels under ticks -->
  <text x="90"  y="145" text-anchor="middle" fill="#1f2937" font-size="16" font-weight="700">-2,147,483,648</text>
  <text x="90"  y="165" text-anchor="middle" fill="#475569" font-size="13">INT_MIN</text>

  <text x="360" y="145" text-anchor="middle" fill="#1f2937" font-size="16" font-weight="700">0</text>

  <text x="630" y="145" text-anchor="middle" fill="#1f2937" font-size="16" font-weight="700">2,147,483,647</text>
  <text x="630" y="165" text-anchor="middle" fill="#475569" font-size="13">INT_MAX</text>

  <!-- Wraparound arrow from MAX back to MIN -->
  <path d="M 630 60 C 630 20, 90 20, 90 60" fill="none" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow)" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b" />
    </marker>
  </defs>

  <!-- Caption -->
  <text x="360" y="35" text-anchor="middle" fill="#b45309" font-size="15" font-weight="700">INT_MAX + 1 wraps around to INT_MIN</text>

  <!-- Bottom note -->
  <text x="360" y="200" text-anchor="middle" fill="#475569" font-size="13">Signed 32-bit int (4 bytes): range = -2,147,483,648 to 2,147,483,647</text>
</svg>
