<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <!-- Connectors -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M 360 80 L 130 150" />
    <path d="M 360 80 L 360 150" />
    <path d="M 360 80 L 590 150" />
  </g>

  <!-- Root -->
  <rect x="260" y="20" width="200" height="60" rx="10" fill="#4353d4" />
  <text x="360" y="56" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Control Structure</text>

  <!-- Decision Making -->
  <rect x="20" y="150" width="220" height="60" rx="10" fill="#16A34A" />
  <text x="130" y="186" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">Decision-Making</text>
  <text x="130" y="232" text-anchor="middle" fill="#475569" font-size="13">if, if-else, switch-case</text>

  <!-- Looping -->
  <rect x="250" y="150" width="220" height="60" rx="10" fill="#f59e0b" />
  <text x="360" y="186" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">Looping</text>
  <text x="360" y="232" text-anchor="middle" fill="#475569" font-size="13">for, while, do-while</text>

  <!-- Jumping -->
  <rect x="480" y="150" width="220" height="60" rx="10" fill="#8b5cf6" />
  <text x="590" y="186" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">Jumping</text>
  <text x="590" y="232" text-anchor="middle" fill="#475569" font-size="13">break, continue, goto, return</text>
</svg>
