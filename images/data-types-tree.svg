<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <!-- Connectors -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M 300 80 L 180 150" />
    <path d="M 300 80 L 420 150" />
    <path d="M 420 200 L 420 230 L 540 230 L 540 260" />
    <path d="M 420 200 L 420 230 L 300 230 L 300 260" />
  </g>

  <!-- Root: Data Types -->
  <rect x="220" y="20" width="160" height="60" rx="10" fill="#4353d4" />
  <text x="300" y="56" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Data Types</text>

  <!-- Primitive -->
  <rect x="80" y="150" width="180" height="60" rx="10" fill="#16A34A" />
  <text x="170" y="186" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Primitive</text>
  <text x="170" y="232" text-anchor="middle" fill="#475569" font-size="13">int, char, float, double, void</text>

  <!-- Non-Primitive -->
  <rect x="340" y="150" width="180" height="60" rx="10" fill="#f59e0b" />
  <text x="430" y="186" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Non-Primitive</text>

  <!-- Derived -->
  <rect x="210" y="260" width="180" height="60" rx="10" fill="#8b5cf6" />
  <text x="300" y="296" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Derived</text>
  <text x="300" y="340" text-anchor="middle" fill="#475569" font-size="13">array, pointer, function</text>

  <!-- User-defined -->
  <rect x="450" y="260" width="180" height="60" rx="10" fill="#ec4899" />
  <text x="540" y="296" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">User-Defined</text>
  <text x="540" y="340" text-anchor="middle" fill="#475569" font-size="13">struct, union, enum, typedef</text>
</svg>
